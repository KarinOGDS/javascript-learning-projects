<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Developer Tools Feedback Survey
    </title>

</head>

<body>

    <h1>
        Developer Tools Feedback Survey
    </h1>

    <h2>
        Share Your Feedback
    </h2>

    <label for="name">
        Name:
    </label>

    <br>

    <input
        type="text"
        id="name"
        placeholder="Your Name">

    <br><br>

    <label for="age">
        Age:
    </label>

    <br>

    <input
        type="number"
        id="age"
        placeholder="Your Age">

    <br><br>

    <label for="email">
        Email:
    </label>

    <br>

    <input
        type="email"
        id="email"
        placeholder="Your Email">

    <br><br>

    <label for="job">
        Occupation:
    </label>

    <br>

    <input
        type="text"
        id="job"
        placeholder="Your Occupation">

    <br><br>

    <label for="designation">
        Role:
    </label>

    <br>

    <input
        type="text"
        id="designation"
        placeholder="Your Role">

    <br><br>

    <label for="productType">
        Favorite Technology:
    </label>

    <br>

    <select id="productType">

        <option>
            JavaScript
        </option>

        <option>
            GitHub
        </option>

        <option>
            Visual Studio Code
        </option>

        <option>
            React
        </option>

        <option>
            Node.js
        </option>

    </select>

    <br><br>

    <label for="feedbackText">
        Feedback:
    </label>

    <br>

    <textarea
        id="feedbackText"
        rows="5"
        cols="40"
        placeholder="Write your feedback here">
    </textarea>

    <br><br>

    <button id="submitBtn">
        Submit Feedback
    </button>

    <hr>

    <div
        id="userInfo"
        style="display:none;">

        <h2>
            Submitted Information
        </h2>

        <p>
            Name:
            <span id="userName"></span>
        </p>

        <p>
            Age:
            <span id="userAge"></span>
        </p>

        <p>
            Email:
            <span id="userEmail"></span>
        </p>

        <p>
            Occupation:
            <span id="userJob"></span>
        </p>

        <p>
            Role:
            <span id="userDesignation"></span>
        </p>

        <p>
            Favorite Technology:
            <span id="userProductChoice"></span>
        </p>

        <p>
            Feedback:
            <span id="userFeedback"></span>
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
