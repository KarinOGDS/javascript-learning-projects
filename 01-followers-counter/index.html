<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Followers Counter</title>
</head>

<body>

    <h1>Followers Counter</h1>

    <h2>Account Holder: Peter Parker</h2>

    <p>
        Followers:
        <span id="countDisplay">0</span>
    </p>

    <p id="statusMessage">
        Start growing your audience!
    </p>

    <button onclick="increaseCount()">
        Follow
    </button>

    <button onclick="decreaseCount()">
        Unfollow
    </button>

    <script src="script.js"></script>

</body>

</html>
